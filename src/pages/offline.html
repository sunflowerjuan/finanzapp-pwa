<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6c47ff" />
  <title>FinanZapp — Sin conexión</title>
  <link rel="stylesheet" href="../css/offline.css" />
</head>
<body>
  <div class="offline-card">
    <div class="logo-row">
      <div class="logo-bolt-sm">OFLINE</div>
      <span class="logo-name">Finan<span>Zapp</span></span>
    </div>
    <span class="offline-icon"></span>
    <h1>Sin Conexion Internet</h1>
    <p>Parece que no tienes acceso a internet en este momento.</p>
    <div class="tip">
      <strong>Buenas noticias:</strong> FinanZapp funciona en modo offline.
    </div>
    <p>Verifica tu conexión y vuelve a intentarlo.</p>
    <a href="/" class="btn">← Volver a FinanZapp</a>
  </div>
  <script>
    window.addEventListener('online', () => { window.location.href = '/'; });
  </script>
</body>
</html>
